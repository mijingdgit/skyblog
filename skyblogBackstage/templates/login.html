{% extends 'base.html' %}

{% block title %}登录 - SkyBlog 管理后台{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-bg"></div>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="logo-icon">◈</span>
                <h1>SkyBlog 管理后台</h1>
                <p>登录以管理博客</p>
            </div>

            <form method="post" class="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" class="form-input" placeholder="请输入用户名" required>
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <div class="password-input">
                        <input type="password" name="password" class="form-input" placeholder="请输入密码" required>
                    </div>
                </div>

                {% if error %}
                <div class="error-message">{{ error }}</div>
                {% endif %}

                <button type="submit" class="btn btn-primary login-btn">
                    登录
                </button>
            </form>

            <div class="login-footer">
                <p>默认账户: admin / skyblog123</p>
            </div>
        </div>
    </div>
</div>

<style>
.login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
}

.login-bg {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(ellipse at top, rgba(0, 191, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(0, 255, 255, 0.05) 0%, transparent 50%);
    z-index: 0;
}

.login-container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
}

.login-card {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0, 191, 255, 0.15);
    border-radius: 24px;
    padding: 48px 40px;
}

.login-header {
    text-align: center;
    margin-bottom: 40px;
}

.logo-icon {
    font-size: 3rem;
    color: var(--primary);
    display: block;
    margin-bottom: 16px;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.1); }
}

.login-header h1 {
    font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
    font-size: 1.8rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.login-header p {
    color: var(--text-muted);
    font-size: 0.95rem;
}

.login-form {
    display: flex;
    flex-direction: column;
    gap: 24px;
}

.form-group label {
    display: block;
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 8px;
}

.error-message {
    padding: 12px 16px;
    background: rgba(255, 59, 48, 0.1);
    border: 1px solid rgba(255, 59, 48, 0.3);
    border-radius: 10px;
    color: var(--danger);
    font-size: 0.9rem;
}

.login-btn {
    width: 100%;
    padding: 16px;
    font-size: 1.1rem;
}

.login-footer {
    margin-top: 32px;
    text-align: center;
}

.login-footer p {
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.4);
}

@media (max-width: 480px) {
    .login-card {
        padding: 32px 24px;
    }
}
</style>
{% endblock %}
